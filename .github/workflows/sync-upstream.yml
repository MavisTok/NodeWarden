name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/shuaiplus/NodeWarden.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main || echo "Merge conflict detected"
        continue-on-error: true

      - name: Create Pull Request
        id: create_pull_request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync upstream changes"
          title: "[Auto] Sync upstream main"
          body: "自动同步上游仓库的最新更改"
          branch: sync-upstream
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create_pull_request.outputs.pull-request-number != ''
        run: |
          gh pr merge ${{ steps.create_pull_request.outputs.pull-request-number }} \
            --auto \
            --squash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
